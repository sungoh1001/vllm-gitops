<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vLLM GitOps 설계 — 채팅 로그 2026-06-16</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid #334155;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(90deg, #818cf8, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header .meta {
    font-size: 13px;
    color: #94a3b8;
  }

  /* ── Main ── */
  main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .page-container {
    position: absolute;
    inset: 0;
    display: flex;
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }

  .page {
    flex: 0 0 100%;
    height: 100%;
    overflow-y: auto;
    padding: 40px 48px 24px;
    display: flex;
    flex-direction: column;
  }

  .page::-webkit-scrollbar { width: 6px; }
  .page::-webkit-scrollbar-track { background: transparent; }
  .page::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

  /* ── Page Header ── */
  .page-number {
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  /* ── Questions ── */
  .qa-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
  }

  .question {
    background: linear-gradient(135deg, #1e293b, #1a2332);
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 24px;
    position: relative;
  }

  .question::before {
    content: "Q";
    position: absolute;
    top: -10px;
    left: 16px;
    background: #818cf8;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 6px;
  }

  .question .label {
    font-size: 11px;
    font-weight: 600;
    color: #818cf8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .question .text {
    font-size: 16px;
    line-height: 1.7;
    color: #f1f5f9;
  }

  .question .text strong {
    color: #a5b4fc;
  }

  .answer {
    background: linear-gradient(135deg, #0f1a2e, #14203a);
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 24px;
    position: relative;
    margin-left: 24px;
  }

  .answer::before {
    content: "A";
    position: absolute;
    top: -10px;
    left: 16px;
    background: #38bdf8;
    color: #0f172a;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 6px;
  }

  .answer .label {
    font-size: 11px;
    font-weight: 600;
    color: #38bdf8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .answer .text {
    font-size: 15px;
    line-height: 1.7;
    color: #cbd5e1;
  }

  .answer .text strong {
    color: #7dd3fc;
  }

  /* ── Decision Box ── */
  .decision {
    background: linear-gradient(135deg, #0a1e1a, #0d281f);
    border: 1px solid #1a473a;
    border-radius: 10px;
    padding: 18px 20px;
    margin-left: 36px;
    position: relative;
  }

  .decision::before {
    content: "✓ 결정";
    position: absolute;
    top: -10px;
    left: 16px;
    background: #10b981;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 6px;
  }

  .decision .text {
    font-size: 14px;
    line-height: 1.6;
    color: #6ee7b7;
  }

  .decision table {
    margin-top: 10px;
    border-collapse: collapse;
    font-size: 13px;
    width: 100%;
  }

  .decision td {
    padding: 4px 12px 4px 0;
    vertical-align: top;
    color: #a7f3d0;
  }

  .decision td:first-child {
    color: #6ee7b7;
    font-weight: 600;
    white-space: nowrap;
    width: 1%;
  }

  /* ── Code ── */
  pre {
    background: #0a0f1a;
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: #e2e8f0;
    overflow-x: auto;
    margin: 12px 0 0 0;
  }

  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: #1e293b;
    padding: 2px 6px;
    border-radius: 4px;
    color: #f1f5f9;
  }

  pre code {
    background: none;
    padding: 0;
  }

  /* ── Final Summary ── */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }

  .summary-item {
    background: #1e293b;
    border-radius: 8px;
    padding: 12px 14px;
  }

  .summary-item .key {
    font-size: 11px;
    color: #64748b;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .summary-item .val {
    font-size: 14px;
    color: #e2e8f0;
    font-weight: 500;
  }

  .summary-item .val.ok { color: #34d399; }
  .summary-item .val.no { color: #f87171; }

  /* ── Navigation ── */
  nav {
    background: #1e293b;
    border-top: 1px solid #334155;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  nav .info {
    font-size: 14px;
    color: #94a3b8;
  }

  nav .info strong {
    color: #e2e8f0;
  }

  nav .btn-group {
    display: flex;
    gap: 8px;
  }

  nav button {
    background: #334155;
    border: none;
    color: #e2e8f0;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  nav button:hover:not(:disabled) { background: #475569; }
  nav button:disabled {
    opacity: 0.3;
    cursor: default;
  }

  nav button .arrow {
    font-size: 16px;
    line-height: 1;
  }

  /* ── Progress dots ── */
  .dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #475569;
    transition: all 0.2s;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  .dot.active {
    background: #818cf8;
    box-shadow: 0 0 6px rgba(129, 140, 248, 0.5);
    width: 10px;
    height: 10px;
  }

  .dot.done {
    background: #334155;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .page { padding: 24px 16px 16px; }
    .answer { margin-left: 12px; }
    .decision { margin-left: 20px; }
    .summary-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; gap: 4px; }
    nav { flex-direction: column; gap: 8px; }
  }
</style>
</head>

</header>

<main>

// ──────────────────────────────────────────────
// Render
// ──────────────────────────────────────────────
const container = document.getElementById('pages');
const dotsContainer = document.getElementById('dots');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageLabel = document.getElementById('pageLabel');

let current = 0;

function renderPage(index) {
  const p = pages[index];
  const div = document.createElement('div');
  div.className = 'page';

  let html = `<div class="page-number">PAGE ${p.number} · ${p.summary}</div>`;
  html += `<div class="qa-block">`;
  html += `<div class="question"><div class="label">Question</div><div class="text">${p.q}</div></div>`;
  html += `<div class="answer"><div class="label">Answer</div><div class="text">${p.a}</div></div>`;

  if (p.recommendation) {
    html += `<div class="decision"><div class="text">💡 ${p.recommendation}</div></div>`;
  }

  if (p.decision) {
    html += `<div class="decision"><div class="text">${p.decision}</div></div>`;
  }

  html += `</div>`;
  div.innerHTML = html;
  container.appendChild(div);
}

// Render all pages
pages.forEach((_, i) => renderPage(i));

// Dots
pages.forEach((_, i) => {
  const dot = document.createElement('button');
  dot.className = 'dot';
  dot.addEventListener('click', () => goTo(i));
  dotsContainer.appendChild(dot);
});

function goTo(i) {
  if (i < 0 || i >= pages.length) return;
  current = i;
  container.style.transform = `translateX(-${current * 100}%)`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === pages.length - 1;
  pageLabel.textContent = `${current + 1} / ${pages.length}`;

  document.querySelectorAll('.dot').forEach((d, idx) => {
    d.className = 'dot' + (idx === current ? ' active' : idx < current ? ' done' : '');
  });
}

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (current < pages.length - 1) goTo(current + 1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (current > 0) goTo(current - 1);
  }
});

// Start
goTo(0);
</script>

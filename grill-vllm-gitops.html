    font-weight: 600;

    margin-bottom: 4px;

  }

    font-weight: 600;

    margin-right: 4px;
    letter-spacing: 0.03em;

  .tag.p1 { background: #3b82f6; color: #0c1929; }
  .tag.p2 { background: #f59e0b; color: #292524; }
  .tag.p3 { background: #64748b; color: #0f172a; }

    color: #e2e8f0;

    height: 7px;

    padding: 0;

  .dot.active {

  .dot.section-start {
    margin-left: 6px;

  .dot.section-start::before {
    content: '';
    position: absolute;
    left: -4px;
    top: 50%;
    width: 2px;
    height: 12px;
    background: #475569;
    transform: translateY(-50%);

  nav .btn-group {
    display: flex;
    gap: 6px;
  }

  nav button {
    background: #1e293b;
    border: 1px solid #334155;
    color: #e2e8f0;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 7px;

    align-items: center;
    gap: 5px;

    .page-title { font-size: 18px; }
    .arch { font-size: 10px; padding: 14px; }
  }

  @media (max-width: 480px) {
    .dots { display: none; }
  }
</style>

          code-server에서 <code>run.sh</code> 수정 → <code>git push</code> →<br>
          Dockhand가 자동으로 pull + 실행.<br><br>
          <strong>Git을 우회할 수 없음 = 자동으로 재현성 확보.</strong>
        </div>
      </div>
    `
  }
];

// ────────────────────────────────────────────────────────
// Render
// ────────────────────────────────────────────────────────
const container = document.getElementById('pages');
const dotsContainer = document.getElementById('dots');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageLabel = document.getElementById('pageLabel');

pages.forEach((p, i) => {
  const div = document.createElement('div');
  div.className = 'page';

  const sectionFirst = i === 0 || pages[i-1].section !== p.section;

  div.innerHTML = `
    <div class="page-header">
      <div class="page-num">${i + 1}</div>
      <span class="page-section">${p.section}</span>
      <span class="page-title">${p.title}</span>
    </div>
    <div class="content">${p.body}</div>
  `;

  container.appendChild(div);
});

// Dots
pages.forEach((_, i) => {
  const dot = document.createElement('button');
  dot.className = 'dot';
  dot.setAttribute('aria-label', `Go to page ${i + 1}`);
  dot.addEventListener('click', () => goTo(i));
  dotsContainer.appendChild(dot);
});

let current = 0;

function goTo(i) {
  if (i < 0 || i >= pages.length) return;
  current = i;
  container.style.transform = `translateX(-${current * 100}%)`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === pages.length - 1;
  pageLabel.textContent = `${current + 1} / ${pages.length} · ${pages[current].title}`;

  document.querySelectorAll('.dot').forEach((d, idx) => {
    d.className = 'dot' + (idx === current ? ' active' : '');
  });
}

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (current < pages.length - 1) goTo(current + 1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (current > 0) goTo(current - 1);
  }
});

// Start
goTo(0);
</script>
